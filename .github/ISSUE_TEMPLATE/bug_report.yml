name: Bug report
description: Report a reproducible problem in CaptchaGenerator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: input
    attributes:
      label: CaptchaGenerator version
      placeholder: 2.0.0
    validations:
      required: true
  - type: input
    attributes:
      label: Python version
      placeholder: 3.12
    validations:
      required: true
  - type: textarea
    attributes:
      label: Minimal reproduction
      render: python
    validations:
      required: true
  - type: textarea
    attributes:
      label: Traceback or screenshots

